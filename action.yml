name: statgate
description: >-
  Statistically calibrated ship or block gate for LLM evals. Compares a
  candidate eval run against a baseline and fails the check only when a
  regression is statistically real, with an error-bar report posted to
  the pull request.
author: Yashwanth Chimata
branding:
  icon: shield
  color: green

inputs:
  baseline:
    description: Path to the baseline results file.
    required: true
  candidate:
    description: Path to the candidate results file.
    required: true
  config:
    description: Path to a statgate.toml configuration file.
    required: false
    default: ""
  adapter:
    description: Results format (auto, jsonl, json, csv, promptfoo).
    required: false
    default: auto
  margin:
    description: Non-inferiority margin override.
    required: false
    default: ""
  alpha:
    description: Significance level override.
    required: false
    default: ""
  comment:
    description: Post the report as a sticky pull request comment.
    required: false
    default: "true"
  fail-on-inconclusive:
    description: Fail the check when the suite is too small to decide.
    required: false
    default: "false"
  github-token:
    description: Token used to post the pull request comment.
    required: false
    default: ${{ github.token }}
  python-version:
    description: Python version used to run statgate.
    required: false
    default: "3.12"

outputs:
  verdict:
    description: SHIP, BLOCK, INCONCLUSIVE, or ERROR.
    value: ${{ steps.gate.outputs.verdict }}
  exit-code:
    description: Raw statgate exit code (0, 1, 2, or 3).
    value: ${{ steps.gate.outputs.exit-code }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install statgate
      shell: bash
      run: python -m pip install --quiet "${{ github.action_path }}"

    - name: Run gate
      id: gate
      shell: bash
      env:
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_CANDIDATE: ${{ inputs.candidate }}
        INPUT_ADAPTER: ${{ inputs.adapter }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_MARGIN: ${{ inputs.margin }}
        INPUT_ALPHA: ${{ inputs.alpha }}
      run: |
        set +e
        args=(compare "$INPUT_BASELINE" "$INPUT_CANDIDATE"
              --adapter "$INPUT_ADAPTER"
              --format markdown --output statgate-report.md)
        if [ -n "$INPUT_CONFIG" ]; then args+=(--config "$INPUT_CONFIG"); fi
        if [ -n "$INPUT_MARGIN" ]; then args+=(--margin "$INPUT_MARGIN"); fi
        if [ -n "$INPUT_ALPHA" ]; then args+=(--alpha "$INPUT_ALPHA"); fi
        statgate "${args[@]}"
        code=$?
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"
        case "$code" in
          0) verdict=SHIP ;;
          1) verdict=BLOCK ;;
          2) verdict=INCONCLUSIVE ;;
          *) verdict=ERROR ;;
        esac
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        if [ -f statgate-report.md ]; then
          cat statgate-report.md >> "$GITHUB_STEP_SUMMARY"
        fi
        exit 0

    - name: Comment on pull request
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: python "${{ github.action_path }}/scripts/upsert_comment.py" statgate-report.md

    - name: Enforce verdict
      shell: bash
      env:
        CODE: ${{ steps.gate.outputs.exit-code }}
        VERDICT: ${{ steps.gate.outputs.verdict }}
        FAIL_ON_INCONCLUSIVE: ${{ inputs.fail-on-inconclusive }}
      run: |
        echo "statgate verdict: $VERDICT (exit code $CODE)"
        if [ "$CODE" = "1" ]; then
          echo "blocking: the regression is statistically real"
          exit 1
        fi
        if [ "$CODE" = "2" ] && [ "$FAIL_ON_INCONCLUSIVE" = "true" ]; then
          echo "failing: the suite is too small to decide and fail-on-inconclusive is set"
          exit 1
        fi
        if [ "$CODE" != "0" ] && [ "$CODE" != "2" ]; then
          echo "statgate failed to run"
          exit "$CODE"
        fi
